name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/eyecare.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Align APK
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | tail -1)
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/eyecare-aligned.apk

      - name: Sign APK with apksigner
        env:
          KS_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks app/eyecare.keystore --ks-key-alias "$KS_ALIAS" --ks-pass "pass:$KS_PASS" --key-pass "pass:$KS_KEYPASS" --out app/build/outputs/apk/release/eyecare-release.apk app/build/outputs/apk/release/eyecare-aligned.apk

      - name: Sign AAB with jarsigner
        env:
          KS_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          cp app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/eyecare-release.aab
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore app/eyecare.keystore -storepass "$KS_PASS" -keypass "$KS_KEYPASS" app/build/outputs/bundle/release/eyecare-release.aab "$KS_ALIAS"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: eyecare-release-apk
          path: app/build/outputs/apk/release/eyecare-release.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: eyecare-release-aab
          path: app/build/outputs/bundle/release/eyecare-release.aab
