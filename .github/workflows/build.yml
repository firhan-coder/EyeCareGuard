name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/eyecare.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: List build output (debug)
        run: find app/build/outputs/apk -type f

      - name: Sign APK
        env:
          KS_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore app/eyecare.keystore -storepass "$KS_PASS" -keypass "$KS_KEYPASS" "$UNSIGNED_APK" "$KS_ALIAS"

      - name: Align APK
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/eyecare-release.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: eyecare-release
          path: app/build/outputs/apk/release/eyecare-release.apk
